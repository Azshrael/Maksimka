<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СУИЗИУИЗИТЫЙ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .main-text {
            font-size: 90px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .ascii {
            font-size: 60px;
            color: #ffffff;
            margin: 20px 0 30px 0;
            line-height: 1;
            font-family: monospace;
        }

        .small-text {
            font-size: 28px;
            color: #888888;
            font-weight: normal;
            margin: 0;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="main-text">СУИЗИУИЗИТЫЙ</div>
    <div class="ascii">8====================================3</div>
    <div class="small-text">слоёцки</div>
</body>
</html>
