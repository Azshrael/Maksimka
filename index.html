<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СУИЗИУИЗИТЫЙ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .main-text {
            font-size: 120px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            line-height: 1;
            text-align: center;
        }

        .sub-text {
            font-size: 48px;
            color: #888888;
            font-weight: 400;
            margin-top: 20px;
            letter-spacing: 4px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .main-text {
                font-size: 80px;
            }
            .sub-text {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="main-text">СУИЗИУИЗИТЫЙ</div>
    <div class="sub-text">слоёцки</div>
</body>
</html>
